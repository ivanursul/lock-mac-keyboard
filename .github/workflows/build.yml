name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build
        run: |
          cd LockKeyboard
          xcodebuild -project LockKeyboard.xcodeproj \
            -scheme LockKeyboard \
            -configuration Release \
            -derivedDataPath build \
            build
