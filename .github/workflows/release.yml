name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build
        run: |
          cd LockKeyboard
          xcodebuild -project LockKeyboard.xcodeproj \
            -scheme LockKeyboard \
            -configuration Release \
            -derivedDataPath build \
            build

      - name: Package app
        run: |
          cd LockKeyboard/build/Build/Products/Release
          ditto -c -k --keepParent LockKeyboard.app LockKeyboard.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: LockKeyboard/build/Build/Products/Release/LockKeyboard.zip
          generate_release_notes: true
